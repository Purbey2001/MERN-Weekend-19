<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .vikas {
        width: 200px;
        height: 400px;
        border: 5px solid yellow;
      }
    </style>
  </head>
  <body>
    <h1 id="byid">this is by id</h1>
    <h1>this is also a h1</h1>
    <h2 class="byclass">item-1</h2>
    <h2 class="byclass">item-2</h2>

    <div class="container">
      <p>item-1</p>
      <p>item-2</p>
      <p>item-3</p>
      <p>item-4</p>
    </div>
    <img src="" alt="" />
    <script>
      /*
       * =========================================================================
       * DOCUMENT OBJECT MODEL (DOM) IN JAVASCRIPT
       * =========================================================================
       *
       * What is the DOM?
       * ----------------
       * The DOM is a programming interface that represents an HTML/XML document
       * as a tree structure. It provides methods and properties to interact with
       * the document dynamically using JavaScript.
       *
       * Key Points:
       * - The DOM treats the HTML document as a tree of nodes
       * - Each HTML element becomes a node in the tree
       * - The 'document' object is the root of the DOM tree
       * - Every element, text, and attribute is represented as a node
       * - JavaScript can read, create, modify, and delete nodes
       *
       * DOM Tree Structure:
       * -------------------
       *         document
       *            |
       *       <html>
       *        /  \
       *    <head> <body>
       *     |       / | \
       *   <meta>  <h1><h2><div>
       *           |   |   | ... |
       *
       * =========================================================================
       * SECTION 1: SELECTING/ACCESSING DOM ELEMENTS
       * =========================================================================
       *
       * There are several ways to access elements from the DOM:
       */

      // METHOD 1: document.getElementById(id)
      // - Selects a SINGLE element by its 'id' attribute
      // - Returns the element object or null if not found
      // - FASTEST method as IDs are unique
      // - Returns: Element object or null
      let res = document.getElementById("byid");
      // Example: <h1 id="byid">this is by id</h1>
      // console.log(res); // <h1 id="byid">...</h1>

      // METHOD 2: document.getElementsByTagName(tagName)
      // - Selects ALL elements by tag name (e.g., "h1", "div", "p")
      // - Returns an HTMLCollection (live, auto-updates if DOM changes)
      // - Must use index to access individual elements
      // - SLOWER than getElementById but useful for getting all elements of a type
      // - Returns: HTMLCollection (array-like, not a true array)
      let res2 = document.getElementsByTagName("h1");
      // Example: All <h1> elements on the page
      // console.log(res2.length); // Get count of h1 elements
      // console.log(res2[0]); // Access first h1 element
      // res2[0].innerText = "Changed"; // Modify first h1

      // METHOD 3: document.getElementsByClassName(className)
      // - Selects ALL elements with a specific class name
      // - Returns an HTMLCollection (live, auto-updates)
      // - Use index to access individual elements
      // - Returns: HTMLCollection
      let res3 = document.getElementsByClassName("byclass");
      // Example: <h2 class="byclass">item-1</h2>
      // console.log(res3.length); // Number of elements with class "byclass"
      // console.log(res3[0]); // First element with class "byclass"

      // METHOD 4: document.querySelectorAll(selector)
      // - Selects ALL elements matching a CSS selector
      // - Returns a NodeList (static, not live)
      // - Works with CSS selectors: ".class", "#id", "tag", "[attr]", etc.
      // - MORE FLEXIBLE than getElementsBy* methods
      // - Returns: NodeList (not updated when DOM changes)
      let res4 = document.querySelectorAll(".byclass");
      // Example selectors:
      // ".byclass" - all elements with class "byclass"
      // "#byid" - element with id "byid"
      // "h1" - all h1 elements
      // "div > p" - all p elements that are direct children of div
      // "[alt]" - all elements with an alt attribute
      // "p.byclass" - all p elements with class "byclass"

      // METHOD 5: document.querySelector(selector)
      // - Selects the FIRST element matching a CSS selector
      // - Returns a single Element object or null
      // - Most MODERN and RECOMMENDED method
      // - Returns: Element object or null
      let res5 = document.querySelector(".container");
      // Example: Gets the first element with class "container"
      // console.log(res5);

      /*
       * =========================================================================
       * SECTION 2: DOM TREE TRAVERSAL & RELATIONSHIPS
       * =========================================================================
       *
       * Once you have an element, you can navigate the DOM tree:
       */

      // PARENT-CHILD RELATIONSHIPS:
      // - element.childNodes - All child nodes (includes text nodes)
      // - element.children - Only element children (no text nodes)
      // - element.parentNode - The parent element
      // - element.parentElement - The parent element
      // - element.firstChild - First child node (may be text)
      // - element.lastChild - Last child node (may be text)
      // - element.firstElementChild - First element child (skips text)
      // - element.lastElementChild - Last element child (skips text)

      // SIBLING RELATIONSHIPS:
      // - element.nextSibling - Next sibling node (may be text)
      // - element.nextElementSibling - Next sibling element
      // - element.previousSibling - Previous sibling node (may be text)
      // - element.previousElementSibling - Previous sibling element

      // Example:
      // const container = document.querySelector(".container");
      // console.log(container.childNodes); // All children including text nodes
      // console.log(container.children); // Only <p> elements
      // console.log(container.parentElement); // The <body> element

      /*
       * =========================================================================
       * SECTION 3: CREATING AND INSERTING ELEMENTS
       * =========================================================================
       *
       * You can create new HTML elements dynamically:
       */

      // STEP 1: Create an element using document.createElement(tagName)
      // - Creates a new HTML element
      // - Returns an Element object
      // - The element is NOT yet in the DOM (just in memory)
      const heading = document.createElement("h3");
      // Now 'heading' is a new <h3> element that exists in memory

      // STEP 2: Set content using innerText, innerHTML, or textContent
      heading.innerText = "vikas thakur"; // Sets human-readable text
      // innerText - Sets visible text (respects CSS display:none)
      // textContent - Sets text content (ignores CSS)
      // innerHTML - Sets HTML content (can include tags)
      // Example: heading.innerHTML = "<strong>vikas thakur</strong>";

      // STEP 3: Set attributes using setAttribute(name, value)
      heading.setAttribute("id", "myHeading");
      heading.setAttribute("class", "highlight");
      // Alternatively: heading.id = "myHeading";
      //                heading.className = "highlight";

      // STEP 4: Insert into the DOM using appendChild() or insertBefore()
      // document.body.appendChild(heading); // Adds to end of body

      /*
       * =========================================================================
       * SECTION 4: MODIFYING ELEMENT ATTRIBUTES AND CLASSES
       * =========================================================================
       */

      // SETATTRIBUTE Method:
      // - Sets an attribute and returns undefined
      // - Works for any attribute: src, alt, data-*, aria-*, etc.
      const dp = document.createElement("img");
      dp.setAttribute(
        "src",
        "https://images.pexels.com/photos/36532019/pexels-photo-36532019.jpeg",
      );
      dp.setAttribute("alt", "this was an image of xyz");
      // Result: <img src="https://..." alt="this was an image of xyz" />

      // CLASSLIST API:
      // - element.classList.add(className) - Adds a class
      // - element.classList.remove(className) - Removes a class
      // - element.classList.toggle(className) - Toggles a class
      // - element.classList.contains(className) - Checks if class exists
      dp.classList.add("vikas");
      // Result: <img class="vikas" ... />

      // Alternative (older method, not recommended):
      // dp.className = "vikas"; // Overwrites ALL classes
      // dp.className += " vikas"; // Appends a class but errors if already exists

      /*
       * =========================================================================
       * SECTION 5: REMOVING ELEMENTS FROM THE DOM
       * =========================================================================
       */

      // element.remove() - Removes the element from the DOM
      // const element = document.getElementById("someId");
      // element.remove();

      // parent.removeChild(child) - Removes a child from parent
      // document.body.removeChild(dp);

      /*
       * =========================================================================
       * SECTION 6: APPENDING ELEMENTS TO THE DOM
       * =========================================================================
       */

      // APPEND METHODS:
      // - element.appendChild(child) - Adds child as last child
      // - element.insertBefore(newChild, referenceChild) - Inserts before reference
      // - element.append(...children) - Modern method, can append multiple
      // - element.prepend(...children) - Adds as first child(ren)

      // Example 1: Append to body (adds at the end)
      console.log(dp); // Log the element before adding to DOM
      document.body.appendChild(dp); // Now it appears on the page

      // Example 2: Append multiple children
      // const div = document.querySelector(".container");
      // const p1 = document.createElement("p");
      // const p2 = document.createElement("p");
      // p1.innerText = "Paragraph 1";
      // p2.innerText = "Paragraph 2";
      // div.append(p1, p2); // Append both at once (modern method)

      // Example 3: Insert before a specific element
      // const firstP = div.firstElementChild; // Get first <p>
      // const newP = document.createElement("p");
      // newP.innerText = "Inserted at beginning";
      // div.insertBefore(newP, firstP); // Put newP before firstP

      /*
       * =========================================================================
       * SECTION 7: READING AND MODIFYING TEXT/HTML CONTENT
       * =========================================================================
       */

      // TEXT CONTENT METHODS:
      // - element.innerText - User-visible text (respects CSS)
      // - element.textContent - All text content (raw, ignores CSS)
      // - element.innerHTML - HTML content (includes tags)

      // Example differences:
      // HTML: <div id="test"><span style="display:none">Hidden</span>Visible</div>
      // element.innerText → "Visible" (respects display:none)
      // element.textContent → "HiddenVisible" (all text)
      // element.innerHTML → '<span style="display:none">Hidden</span>Visible'

      // WHEN TO USE WHAT:
      // innerHTML - When you need to add HTML tags/elements
      // innerText - When you only need to set/get readable text
      // textContent - When you want raw text without CSS consideration

      /*
       * =========================================================================
       * IMPORTANT NOTES AND BEST PRACTICES
       * =========================================================================
       *
       * Performance Tips:
       * - getElementBy* methods return live collections (auto-update)
       * - querySelectorAll returns static NodeList (faster)
       * - Batch DOM mutations to reduce reflows
       * - Cache element references to avoid repeated queries
       *
       * Difference: HTMLCollection vs NodeList
       * HTMLCollection - Lives updates, slower
       *    - getElementsByTagName()
       *    - getElementsByClassName()
       * NodeList - Static, faster (usually)
       *    - querySelectorAll()
       *    - childNodes property
       *
       * Security Note:
       * - Use innerHTML only with trusted content (XSS risk)
       * - Use textContent or innerText for user-generated content
       *
       * Reflow & Repaint:
       * - Modifying DOM causes browser to recalculate layout (reflow)
       * - Multiple changes should be batched
       * - Example: Add multiple elements in a loop, then append once
       *
       * =========================================================================
       */
    </script>
  </body>
</html>
