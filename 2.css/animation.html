<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container {
        width: 700px;
        height: 600px;
        background-color: green;
        display: flex;
        justify-content: center;
        align-items: end;
      }
      .ball {
        width: 100px;
        height: 100px;
        background-color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        /* CSS animation shorthand:
           animation: <name> <duration> <iteration-count> <timing-function>;
           - name: keyframes identifier to run
           - duration: total time for one cycle
           - iteration-count: infinite | number (1,2,3...)
           - timing-function: speed curve (ease, linear, ease-in, ease-out, ease-in-out, cubic-bezier)
        */
        animation: jump 2s infinite ease-in-out;

        /* Useful optional animation properties (not used here):
           animation-delay: wait before animation starts (e.g., 500ms)
           animation-direction: normal | reverse | alternate | alternate-reverse
           animation-fill-mode: none | forwards | backwards | both
           animation-play-state: running | paused
        */
      }

      /* @keyframes defines animation stages using percentages:
         0%   = start state
         50%  = middle state
         100% = end state (same as 'to')
         Browser interpolates values between stages automatically.
      */
      @keyframes jump {
        0% {
          /* Ball at original position */
          transform: translateY(0);
        }
        50% {
          /* Negative Y moves element upward */
          transform: translateY(-300px);
          /* You can animate colors, opacity, transform, etc. */
          background-color: red;
        }
        100% {
          /* Return to ground to complete one loop */
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="ball">IND VS WI</div>
    </div>
  </body>
</html>
