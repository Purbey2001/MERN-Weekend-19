<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container {
        /* width: 900px;
        height: 800px; */
        width: 100vw;
        height: 100vh;
        background-color: beige;
        display: grid;
        /* grid-template-columns: repeat(3, 1fr); */
        /* column-gap: 10px;
        row-gap: 10px; */
        gap: 10px;
        /* justify-content: center;
        align-content: center; */
        /* justify-content: center; */
        /* align-content: center; */
        grid-template-areas: "header header header" "sidebar content-1 content-1" "sidebar content-2 content-3" "footer footer footer";
      }
      .child {
        /* width: 100px;
        height: 100px; */
        background-color: red;
        /* margin: 10px; */
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .header {
        grid-area: header;
        background-color: aqua;
      }
      .sidebar {
        grid-area: sidebar;
        background-color: pink;
      }
      .content-1 {
        grid-area: content-1;
        background-color: yellow;
      }
      .content-2 {
        grid-area: content-2;
        background-color: green;
      }
      .content-3 {
        grid-area: content-3;
        background-color: blue;
      }
      .footer {
        grid-area: footer;
        background-color: orange;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="child header">item-1</div>
      <div class="child sidebar">item-2</div>
      <div class="child content-1">item-3</div>
      <div class="child content-2">item-4</div>
      <div class="child content-3">item-5</div>
      <div class="child footer">item-6</div>
    </div>
  </body>
</html>
